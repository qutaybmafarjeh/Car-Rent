<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Details</title>
    <link href="./assets/css/output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <div class="h-16 header p-2 sticky top-0">

        <div class="n-full mx-auto container">
            <div class="flex gap-12 items-center justify-between">
                <div class="flex items-center gap-[14.5px]  max-md:hidden">
                    <img src="./assets/image/car.svg" />
                    <h3 class="text-sm font-open font-bold">Car Rental</h3>

                </div>
                <div>
                    <ul class="flex gap-5 font-semibold max-md:hidden">
                        <li class="hover:text-[#FF9E0C]"><a href="./index.html">Home</a> <br></li>
                        <li class="font-bold hover:text-[#FF9E0C]"><a href="./Vehicles.html">Vehicles</a> <br></li>
                        <li class="hover:text-[#FF9E0C]">Details</li>
                        <li class="hover:text-[#FF9E0C]">About Us</li>
                        <li class="hover:text-[#FF9E0C]">Contact Us</li>
                    </ul>
                </div>
                <button class="md:hidden size-12">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div class="flex items-center gap-3">
                    <img src="./assets/image/needhelp.svg" />
                    <div class="flex-column">
                        <h3>Need help?</h3>
                        <h3 class="font-bold"> +996 247-1680</h3>
                    </div>
                </div>
            </div>
        </div>

    </div>


    <main>

        <section class="details py-8">

            <div class="n-full mx-auto container">
                <div class="detail flex justify-center gap-20">
                    <div class="left-side">
                        <h2 class="font-bold text-xl pb-2">BMW</h2>
                        <h4 class="font-bold text-[#5937E0] pb-2">$25 <span class="text-gray-500">/day</span></h4>
                        <img class="w-140 h-75.75" src="./assets/image/image-card/maybach.jpg" />
                        <div class="img-details flex gap-6 py-4 justify-center">

                            <img class="h-35 w-32" src="./assets/image/img-details/inside1.jpeg" />
                            <img class="h-35 w-32" src="./assets/image/img-details/inside2.jpg" />
                            <img class="h-35 w-32" src="./assets/image/img-details/inside3.jpg" />

                        </div>
                    </div>

                    <div class="right-side">
                        <h2 class="font-bold text-xl">Technical Specification</h2>

                        <div class="Specification py-6">
                            <div class="specific flex gap-3">
                                <div class="card sm:max-w-sm p-3 pr-10 bg-[#FAFAFA]">
                                    <figure><img src="./assets/image/img-details/specific/gear-shift.svg" />
                                    </figure>
                                    <div class="card-body">
                                        <h5 class="card-title font-bold py-1">gear-shift</h5>
                                        <span class="text-xs">Automatic</span>

                                    </div>
                                </div>
                                <div class="card sm:max-w-sm p-3 pr-20 bg-[#FAFAFA]">
                                    <figure><img src="./assets/image/img-details/specific/gas.svg" />
                                    </figure>
                                    <div class="card-body ">
                                        <h5 class="card-title font-bold py-1">Fuel</h5>
                                        <span class="text-xs">Petrol</span>

                                    </div>
                                </div>
                                <div class="card sm:max-w-sm p-3 pr-20 bg-[#FAFAFA]">
                                    <figure><img src="./assets/image/img-details/specific/door.svg" />
                                    </figure>
                                    <div class="card-body">
                                        <h5 class="card-title font-bold py-1">Door</h5>
                                        <span class="text-xs">2</span>

                                    </div>
                                </div>
                            </div>
                            <div class="specific flex gap-3 py-3">
                                <div class="card sm:max-w-sm p-3 pr-5 bg-[#FAFAFA]">
                                    <figure><img src="./assets/image/img-details/specific/gear-shift.svg"></figure>
                                    <div class="card-body">
                                        <h5 class="card-title font-bold py-1">Air Conditioner</h5>
                                        <span class="text-xs">Yes</span>

                                    </div>
                                </div>
                                <div class="card sm:max-w-sm p-3 pr-20 bg-[#FAFAFA]">
                                    <figure><img src="./assets/image/img-details/specific/Mask group.svg" /></figure>
                                    <div class="card-body">
                                        <h5 class="card-title font-bold py-1">Seats</h5>
                                        <span class="text-xs">4</span>

                                    </div>
                                </div>
                                <div class="card sm:max-w-sm p-3 pr-20 bg-[#FAFAFA]">
                                    <figure><img src="./assets/image/img-details/specific/location.svg" /></figure>
                                    <div class="card-body">
                                        <h5 class="card-title font-bold py-1">Distance</h5>
                                        <span class="text-xs">500</span>

                                    </div>
                                </div>
                            </div>
                        </div>

                        <button class="border bg-[#5937E0] py-2 px-10 rounded-2xl text-white">Rent a car</button>
                   
                        <div class="eque py-8">

                            <h3 class="font-bold text-xl">Car Equipment</h3>

                            <div class="details grid grid-cols-2 py-6 gap-2">

                                <div class="details-true flex gap-2">

                                    <img src="./assets/image/img-details/specific/Frame.svg"/>
                                    <span>ABS</span>

                                </div>
                                 <div class="details-true flex gap-2">

                                    <img src="./assets/image/img-details/specific/Frame.svg"/>
                                    <span>ABS</span>

                                </div> <div class="details-true flex gap-2">

                                    <img src="./assets/image/img-details/specific/Frame.svg"/>
                                    <span>Air Bags</span>

                                </div> <div class="details-true flex gap-2">

                                    <img src="./assets/image/img-details/specific/Frame.svg"/>
                                    <span>Air Bags</span>

                                </div> <div class="details-true flex gap-2">

                                    <img src="./assets/image/img-details/specific/Frame.svg"/>
                                    <span>Cruise Control</span>

                                </div> <div class="details-true flex gap-2">

                                    <img src="./assets/image/img-details/specific/Frame.svg"/>
                                    <span>Air Conditioner</span>

                                </div>

                            </div>

                        </div>
                   
                    </div>



                </div>

        </section>



    </main>

</body>

</html>
