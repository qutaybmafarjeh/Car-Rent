<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Rents</title>
    <link href="./assets/css/output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
    <div class="h-16 header p-2">

        <div class="n-full mx-auto container">
            <div class="flex gap-12 items-center justify-between">
                <div class="flex items-center gap-[14.5px]  max-md:hidden">
                    <img src="./assets/image/car.svg" />
                    <h3 class="text-sm font-open font-bold">Car Rental</h3>

                </div>
                <div>
                    <ul class="flex gap-5 font-semibold max-md:hidden">
                        <li class="hover:text-[#FF9E0C]">Home</li>
                        <li class="font-bold hover:text-[#FF9E0C]">Vehicles</li>
                        <li class="hover:text-[#FF9E0C]">Details</li>
                        <li class="hover:text-[#FF9E0C]">About Us</li>
                        <li class="hover:text-[#FF9E0C]">Contact Us</li>
                    </ul>
                </div>
                <button class="md:hidden size-12">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div class="flex items-center gap-3">
                    <img src="./assets/image/needhelp.svg" />
                    <div class="flex-column">
                        <h3>Need help?</h3>
                        <h3 class="font-bold"> +996 247-1680</h3>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <main>

        <div class="hero relative">
            <img class="absolute left-96 pb-5 " src="./assets/image/backcar.png"/>
            <div class="mx-auto py-8 rounded-2xl container bg-[#5937E0]">
                <div class="flex justify-center gap-10 flex-wrap">
                    <div class="left-side relative">
                        <h2 class="text-white font-bold text-4xl pb-5">Experience the road <br> like never before</h2>
                        <p class="text-white pb-5">Aliquam adipiscing velit semper morbi. Purus non eu <br> cursus
                            porttitor
                            tristique et gravida. Quis nunc interdum <br> gravida ullamcorper</p>
                        <button class="rounded-2xl px-4 py-0.5 text-white bg-[#FF9E0C]">View all cars</button>
                    </div>

                    <div class="right-side rounded-2xl bg-white p-6 relative">
                        <h3 class="text-center pb-2 font-bold">Book your car</h3>
                        <div class="inputs flex flex-col">
                            <input type="text" placeholder="Car Type" class="input pb-2 p-0.5" />
                            <input type="text" placeholder="Place of rental" class="input pb-2 p-0.5" />
                            <input type="text" placeholder="Place of return" class="input pb-2 p-0.5" />
                            <input type="date" placeholder="Rental date" class="input pb-2 p-0.5" />
                            <input type="date" placeholder="Return date" class="input pb-2 p-0.5" />
                            <button class="rounded-2xl px-4 py-0.5 text-white bg-[#FF9E0C]">Book Now</button>
                        </div>
                    </div>
                </div>
                
            </div>
            </div>

    </main>
</body>

</html>
